<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Nicecraft Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Bungee', cursive;
      background-color: #2c2c2c;
      color: #fff;
    }
    header, footer {
      background: #1c1c1c;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      color: #ffd700;
      font-size: 2.5em;
    }
    nav {
      display: flex;
      justify-content: center;
      background: #333;
      padding: 10px;
      gap: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
      background: #444;
      padding: 10px 20px;
      border-radius: 5px;
      transition: 0.3s;
    }
    nav a:hover {
      background: #ffd700;
      color: #000;
    }
    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
      background: #1f1f1f;
      border-radius: 8px;
      margin-top: 20px;
    }
    section {
      display: none;
    }
    section.active {
      display: block;
    }
    h2 {
      color: #ffd700;
      margin-bottom: 10px;
    }
    .info {
      margin-top: 20px;
    }
    #yetkiRenk {
      font-weight: bold;
    }
    .kurucu { color: #ffd700; }
    .oyuncu { color: #00bfff; }
    button {
      padding: 10px 20px;
      background: #ffd700;
      border: none;
      border-radius: 5px;
      font-family: 'Bungee', cursive;
      cursor: pointer;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #333;
      border: none;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Nicecraft Network</h1>
  </header>
  <nav>
    <a href="#" onclick="navigate('anasayfa')">Ana Sayfa</a>
    <a href="#" onclick="navigate('giris')">Giriş Yap</a>
    <a href="#" onclick="navigate('magaza')">Mağaza</a>
  </nav>
  <main>
    <section id="anasayfa" class="active">
      <h2>Hoş Geldiniz</h2>
      <p>Yetkiniz: <span id="yetkiRenk" class="oyuncu">Oyuncu</span></p>
    </section>
    <section id="giris">
      <h2>Giriş Yap</h2>
      <input type="text" id="kadi" placeholder="Kullanıcı Adı" />
      <input type="password" id="sifre" placeholder="Şifre" />
      <button onclick="girisYap()">Giriş</button>
    </section>
    <section id="magaza">
      <h2>Mağaza</h2>
      <ul>
        <li>VIP - 10 TL <button onclick="alert('Yetersiz bakiye')">Satın Al</button></li>
        <li>VIP+ - 20 TL <button onclick="alert('Yetersiz bakiye')">Satın Al</button></li>
        <li>MVIP - 30 TL <button onclick="alert('Yetersiz bakiye')">Satın Al</button></li>
      </ul>
    </section>
  </main>
  <footer>
    <p>© 2025 Nicecraft Network</p>
  </footer>
  <script>
    function navigate(id) {
      document.querySelectorAll('section').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function girisYap() {
      let kadi = document.getElementById("kadi").value;
      let sifre = document.getElementById("sifre").value;
      let yetki = document.getElementById("yetkiRenk");
      if (kadi === "kurucu" && sifre === "sifre123") {
        yetki.textContent = "Kurucu";
        yetki.className = "kurucu";
      } else {
        alert("Geçersiz Giriş. Oyuncu olarak devam ediliyor.");
        yetki.textContent = "Oyuncu";
        yetki.className = "oyuncu";
      }
      navigate("anasayfa");
    }
  </script>
</body>
</html>
